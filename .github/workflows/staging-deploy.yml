name: Staging Deploy

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Syntax check
        working-directory: backend
        run: |
          for f in src/routes/*.js src/services/*.js src/utils/*.js; do
            node --check "$f"
          done

      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test

      - name: Deploy to Render Preview
        if: success()
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -n "$RENDER_API_KEY" ]; then
            curl -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"clearCache\": \"do_not_clear\"}"
            echo "Staging deploy triggered"
          else
            echo "RENDER_API_KEY not set, skipping staging deploy"
          fi

      - name: Comment PR with staging URL
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### Staging Deploy\n\n` +
              `Backend tests passed. Staging deployment triggered.\n` +
              `URL: https://mindscrolling-staging.onrender.com\n\n` +
              `**Checks:**\n` +
              `- [x] Syntax validation\n` +
              `- [x] Backend tests\n` +
              `- [ ] Manual QA`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Notify Discord on success
        if: success()
        uses: ./.github/actions/notify-discord
        with:
          status: success
          title: Staging Deploy
          details: "PR #${{ github.event.pull_request.number }} passed tests. Staging deployment triggered at https://mindscrolling-staging.onrender.com"
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          notify_everyone_on_failure: 'false'

      - name: Notify Discord on failure
        if: failure()
        uses: ./.github/actions/notify-discord
        with:
          status: failure
          title: Staging Deploy
          details: "PR #${{ github.event.pull_request.number }} failed tests or staging deploy. Merge blocked."
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          notify_everyone_on_failure: 'true'
