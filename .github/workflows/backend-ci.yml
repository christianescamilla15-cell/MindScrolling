name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  lint-and-test:
    name: Lint & Test Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Check for syntax errors
        working-directory: backend
        run: node --check src/app.js

      - name: Validate all route files load
        working-directory: backend
        run: |
          for f in src/routes/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Validate all service files load
        working-directory: backend
        run: |
          for f in src/services/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Validate utility files load
        working-directory: backend
        run: |
          for f in src/utils/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
