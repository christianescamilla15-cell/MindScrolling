name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Check for syntax errors
        working-directory: backend
        run: node --check src/app.js

      - name: Validate all route files load
        working-directory: backend
        run: |
          for f in src/routes/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Validate all service files load
        working-directory: backend
        run: |
          for f in src/services/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Validate utility files load
        working-directory: backend
        run: |
          for f in src/utils/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test

      - name: Notify Discord on success
        if: success()
        uses: ./.github/actions/notify-discord
        with:
          status: success
          title: Backend CI
          details: Lint, syntax checks, and tests all passed.
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          notify_everyone_on_failure: 'false'

      - name: Notify Discord on failure
        if: failure()
        uses: ./.github/actions/notify-discord
        with:
          status: failure
          title: Backend CI
          details: One or more backend lint/test steps failed.
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          notify_everyone_on_failure: 'true'
