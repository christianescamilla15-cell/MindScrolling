name: Backend Health Check

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

jobs:
  health:
    name: Check Backend Health
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run health check
        run: node scripts/health-monitor.js --endpoints

      - name: Alert on failure — create GitHub issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Backend Health Check Failed',
              body: `Backend health check failed at ${new Date().toISOString()}.\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['bug', 'critical']
            });

      # Only notify on failure — success would spam every 30 minutes
      - name: Notify Discord on failure
        if: failure()
        uses: ./.github/actions/notify-discord
        with:
          status: failure
          title: Backend Health Check
          details: "Production endpoint is unreachable or returned an unhealthy status. https://mindscrolling.onrender.com/health"
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          notify_everyone_on_failure: 'true'
