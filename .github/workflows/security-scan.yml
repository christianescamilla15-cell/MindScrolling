name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run full secret scan every Monday at 08:00 UTC
    - cron: "0 8 * * 1"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret & Credential Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for gitleaks + trufflehog

      - name: Run Gitleaks (secret detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional — free tier works without

      - name: Run TruffleHog (deep git history scan)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Notify Discord on failure
        if: failure()
        uses: ./.github/actions/notify-discord
        with:
          status: failure
          title: Security Scan — Secret Detection
          details: Gitleaks or TruffleHog detected a potential secret in the repository.
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          notify_everyone_on_failure: 'true'

  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend dependency audit
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true  # Report but don't block (upgrade separately)

      - name: Notify Discord on failure
        if: failure()
        uses: ./.github/actions/notify-discord
        with:
          status: failure
          title: Security Scan — Dependency Audit
          details: High-severity vulnerability found in backend dependencies.
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          notify_everyone_on_failure: 'true'

  env-file-check:
    name: .env File Leak Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check no real .env files committed
        run: |
          # Fail if any .env (non-example) is tracked
          if git ls-files | grep -E "^\.env$|/\.env$|\.env\.(local|development|production|test)$"; then
            echo "ERROR: Real .env file is tracked by git"
            exit 1
          fi
          echo "OK: No .env files tracked"

      - name: Check no hardcoded Supabase JWTs
        run: |
          # Scan all JS/TS/Dart files for hardcoded JWT tokens
          FOUND=$(grep -rn "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[A-Za-z0-9_-]\+\.[A-Za-z0-9_-]\+" \
            --include="*.js" --include="*.ts" --include="*.dart" \
            --exclude-dir=node_modules --exclude-dir=build --exclude-dir=.dart_tool \
            . 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: Hardcoded JWT token found:"
            echo "$FOUND"
            exit 1
          fi
          echo "OK: No hardcoded JWTs found"

      - name: Check no hardcoded Anthropic keys
        run: |
          FOUND=$(grep -rn '"sk-ant-' \
            --include="*.js" --include="*.ts" --include="*.dart" \
            --exclude-dir=node_modules . 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: Anthropic API key found in source"
            echo "$FOUND"
            exit 1
          fi
          echo "OK: No Anthropic keys found"

      - name: Notify Discord on failure
        if: failure()
        uses: ./.github/actions/notify-discord
        with:
          status: failure
          title: Security Scan — .env Leak Check
          details: A real .env file or hardcoded API key was detected in the repository.
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          notify_everyone_on_failure: 'true'
