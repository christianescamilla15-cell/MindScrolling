name: Auto-Generate Docs

on:
  push:
    branches: [main]
    paths:
      - 'backend/src/routes/**'
      - 'flutter_app/pubspec.yaml'
      - 'backend/src/db/migrations/**'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  generate-docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Generate docs
        run: node scripts/generate-docs.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No docs changes to commit"
          else
            BRANCH="auto-docs/update-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "docs: auto-update API reference, changelog, and project status"
            git push origin "$BRANCH"
            gh pr create --title "docs: auto-update generated documentation" \
              --body "Automated documentation update triggered by code changes." \
              --base main --head "$BRANCH"
            gh pr merge "$BRANCH" --auto --squash --delete-branch
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Only notify on failure — successful doc generation is low-priority
      - name: Notify Discord on failure
        if: failure()
        uses: ./.github/actions/notify-discord
        with:
          status: failure
          title: Auto-Generate Docs
          details: Documentation generation or git push failed.
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          notify_everyone_on_failure: 'false'
