<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindScroll | Calm Tech Sanctuary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        sanctuary: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        accent: {
                            philosophy: '#818cf8', // Indigo
                            stoicism: '#94a3b8',   // Slate
                            discipline: '#fb7185', // Rose
                            reflection: '#2dd4bf', // Teal
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #020617);
            color: #f8fafc;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .pillar-nav {
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .active-pillar {
            position: relative;
        }
        .active-pillar::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: currentColor;
            box-shadow: 0 0 10px currentColor;
        }
        .gesture-hint {
            animation: bounceLeftRight 2s infinite;
        }
        @keyframes bounceLeftRight {
            0%, 100% { transform: translateX(0); opacity: 0.3; }
            50% { transform: translateX(10px); opacity: 1; }
        }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col items-center justify-start p-6">

    <!-- Header Navigation -->
    <nav class="w-full max-w-md flex justify-between items-center mb-12 mt-4">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-teal-400 animate-pulse-slow"></div>
            <span class="text-xl font-semibold tracking-tight">MindScroll</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex flex-col items-end">
                <span class="text-[10px] uppercase tracking-widest text-slate-400">Streak</span>
                <span class="text-sm font-bold text-teal-400">12 Days</span>
            </div>
            <button class="w-10 h-10 rounded-full glass-card flex items-center justify-center hover:bg-white/10 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </button>
        </div>
    </nav>

    <!-- Pillar Selection (Simulated Horizontal Gesture) -->
    <div class="w-full max-w-md mb-8 overflow-x-auto no-scrollbar pillar-nav">
        <div class="flex gap-8 px-4 text-xs font-semibold uppercase tracking-widest text-slate-500 items-center">
            <button class="transition-colors hover:text-white active-pillar text-white" onclick="changePillar('philosophy')">Philosophy</button>
            <button class="transition-colors hover:text-white" onclick="changePillar('stoicism')">Stoicism</button>
            <button class="transition-colors hover:text-white" onclick="changePillar('discipline')">Discipline</button>
            <button class="transition-colors hover:text-white" onclick="changePillar('reflection')">Reflection</button>
        </div>
    </div>

    <!-- Main Content Stage -->
    <main class="relative w-full max-w-md aspect-[3/4] flex items-center justify-center">
        <!-- Card Stack Simulation -->
        <div id="quote-card" class="glass-card w-full h-full rounded-[2.5rem] p-10 flex flex-col justify-between transition-all duration-700 ease-out cursor-grab active:cursor-grabbing transform hover:scale-[1.02]">
            <div class="flex justify-between items-start">
                <div id="pillar-badge" class="px-4 py-1.5 rounded-full text-[10px] font-bold tracking-widest uppercase bg-indigo-500/20 text-indigo-300 border border-indigo-500/30">
                    Philosophy
                </div>
                <button onclick="toggleVault(this)" class="text-slate-400 hover:text-rose-400 transition-colors">
                    <svg id="heart-icon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                </button>
            </div>

            <div class="space-y-6">
                <svg class="w-8 h-8 text-white/20" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21L14.017 18C14.017 16.8954 14.9124 16 16.017 16H19.017C19.5693 16 20.017 15.5523 20.017 15V9C20.017 8.44772 19.5693 8 19.017 8H16.017C14.9124 8 14.017 7.10457 14.017 6V3L20.017 3C21.1216 3 22.017 3.89543 22.017 5V19C22.017 20.1046 21.1216 21 20.017 21H14.017ZM2.01697 21L2.01697 18C2.01697 16.8954 2.9124 16 4.01697 16H7.01697C7.56925 16 8.01697 15.5523 8.01697 15V9C8.01697 8.44772 7.56925 8 7.01697 8H4.01697C2.9124 8 2.01697 7.10457 2.01697 6V3L8.01697 3C9.12154 3 10.017 3.89543 10.017 5V19C10.017 20.1046 9.12154 21 8.01697 21H2.01697Z"></path></svg>
                <p id="quote-text" class="font-serif text-3xl leading-relaxed text-slate-100">
                    The soul becomes dyed with the color of its thoughts.
                </p>
                <div class="h-1 w-12 bg-gradient-to-r from-indigo-500 to-transparent rounded-full"></div>
            </div>

            <div class="flex flex-col">
                <span id="author-name" class="text-lg font-semibold text-white">Marcus Aurelius</span>
                <span id="author-school" class="text-xs text-slate-500 uppercase tracking-widest mt-1">Stoic Emperor</span>
            </div>
        </div>

        <!-- Gesture Hints -->
        <div class="absolute -right-12 top-1/2 -translate-y-1/2 gesture-hint hidden md:flex flex-col items-center gap-2">
            <div class="w-px h-12 bg-slate-700"></div>
            <span class="text-[10px] vertical-text uppercase tracking-widest text-slate-500" style="writing-mode: vertical-rl;">Swipe for Wisdom</span>
        </div>
    </main>

    <!-- Dashboard/Stats Section -->
    <section class="w-full max-w-md mt-12 grid grid-cols-2 gap-4">
        <div class="glass-card rounded-3xl p-6 flex flex-col items-center text-center">
            <span class="text-[10px] uppercase tracking-widest text-slate-500 mb-2">Vault Size</span>
            <span class="text-2xl font-bold">142</span>
            <span class="text-[10px] text-teal-400 mt-1">Reflections Saved</span>
        </div>
        <div class="glass-card rounded-3xl p-6 flex flex-col items-center text-center">
            <span class="text-[10px] uppercase tracking-widest text-slate-500 mb-2">Pillar Focus</span>
            <span class="text-2xl font-bold text-indigo-400">Stoic</span>
            <span class="text-[10px] text-slate-400 mt-1">Primary Interest</span>
        </div>
    </section>

    <!-- Bottom Navigation Bar (Minimal) -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 glass-card rounded-full px-8 py-4 flex gap-12 items-center">
        <button class="text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
        </button>
        <button class="text-slate-500 hover:text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
            </svg>
        </button>
        <button class="text-slate-500 hover:text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
        </button>
    </div>

    <script>
        const contentData = {
            philosophy: [
                { text: "He who has a why to live for can bear almost any how.", author: "Friedrich Nietzsche", sub: "Existentialist", color: "indigo" },
                { text: "We are what we repeatedly do. Excellence, then, is not an act, but a habit.", author: "Aristotle", sub: "Classical Greek", color: "indigo" },
                { text: "The unexamined life is not worth living.", author: "Socrates", sub: "Classical Greek", color: "indigo" }
            ],
            stoicism: [
                { text: "The soul becomes dyed with the color of its thoughts.", author: "Marcus Aurelius", sub: "Stoic Emperor", color: "slate" },
                { text: "Wealth consists not in having great possessions, but in having few wants.", author: "Epictetus", sub: "Stoic Philosopher", color: "slate" },
                { text: "Luck is what happens when preparation meets opportunity.", author: "Seneca", sub: "Stoic Advisor", color: "slate" }
            ],
            discipline: [
                { text: "Discipline equals freedom.", author: "Jocko Willink", sub: "Modern Pragmatist", color: "rose" },
                { text: "First forget inspiration. Habit is more dependable.", author: "Octavia Butler", sub: "Visionary", color: "rose" },
                { text: "It is not enough to be busy; so are the ants. The question is: What are we busy about?", author: "Henry David Thoreau", sub: "Transcendentalist", color: "rose" }
            ],
            reflection: [
                { text: "Everything that irritates us about others can lead us to an understanding of ourselves.", author: "Carl Jung", sub: "Analytical Psychologist", color: "teal" },
                { text: "The cave you fear to enter holds the treasure you seek.", author: "Joseph Campbell", sub: "Mythologist", color: "teal" },
                { text: "Yesterday I was clever, so I wanted to change the world. Today I am wise, so I am changing myself.", author: "Rumi", sub: "Mystic Poet", color: "teal" }
            ]
        };

        let currentPillar = 'philosophy';
        let contentIndex = 0;
        let isLiked = false;

        function changePillar(pillar) {
            currentPillar = pillar;
            contentIndex = 0;
            
            // Update UI State
            document.querySelectorAll('.pillar-nav button').forEach(btn => {
                btn.classList.remove('active-pillar', 'text-white');
                if(btn.innerText.toLowerCase() === pillar) {
                    btn.classList.add('active-pillar', 'text-white');
                }
            });

            refreshCard();
        }

        function refreshCard() {
            const card = document.getElementById('quote-card');
            const data = contentData[currentPillar][contentIndex % contentData[currentPillar].length];
            
            // Animate out
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px) scale(0.95)';

            setTimeout(() => {
                // Update Content
                document.getElementById('quote-text').innerText = data.text;
                document.getElementById('author-name').innerText = data.author;
                document.getElementById('author-school').innerText = data.sub;
                
                const badge = document.getElementById('pillar-badge');
                badge.innerText = currentPillar;
                
                // Color updates based on pillar
                const colors = {
                    philosophy: ['bg-indigo-500/20', 'text-indigo-300', 'border-indigo-500/30'],
                    stoicism: ['bg-slate-500/20', 'text-slate-300', 'border-slate-500/30'],
                    discipline: ['bg-rose-500/20', 'text-rose-300', 'border-rose-500/30'],
                    reflection: ['bg-teal-500/20', 'text-teal-300', 'border-teal-500/30']
                };
                
                badge.className = `px-4 py-1.5 rounded-full text-[10px] font-bold tracking-widest uppercase border ${colors[currentPillar].join(' ')}`;
                
                // Reset Like State
                isLiked = false;
                document.getElementById('heart-icon').setAttribute('fill', 'none');
                document.getElementById('heart-icon').style.color = 'rgb(148, 163, 184)';

                // Animate in
                card.style.opacity = '1';
                card.style.transform = 'translateY(0) scale(1)';
            }, 400);
        }

        function toggleVault(btn) {
            isLiked = !isLiked;
            const icon = document.getElementById('heart-icon');
            if (isLiked) {
                icon.setAttribute('fill', 'currentColor');
                icon.style.color = '#fb7185';
                // Trigger Haptic feel via scale animation
                btn.style.transform = 'scale(1.4)';
                setTimeout(() => btn.style.transform = 'scale(1)', 200);
            } else {
                icon.setAttribute('fill', 'none');
                icon.style.color = 'rgb(148, 163, 184)';
            }
        }

        // Gesture Simulation
        let startY = 0;
        const card = document.getElementById('quote-card');

        card.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        });

        card.addEventListener('touchend', (e) => {
            const endY = e.changedTouches[0].clientY;
            if (startY - endY > 100) { // Swipe Up
                contentIndex++;
                refreshCard();
            }
        });

        // Mouse Drag Simulation
        let isDragging = false;
        let mouseDownY = 0;

        card.addEventListener('mousedown', (e) => {
            isDragging = true;
            mouseDownY = e.clientY;
        });

        window.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            const mouseUpY = e.clientY;
            if (mouseDownY - mouseUpY > 100) {
                contentIndex++;
                refreshCard();
            }
        });

        // Double Click/Tap to Like
        card.addEventListener('dblclick', () => {
            toggleVault(document.querySelector('button[onclick="toggleVault(this)"]'));
        });

    </script>
</body>
</html>
