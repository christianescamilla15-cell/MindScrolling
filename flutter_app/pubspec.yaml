name: mind_scrolling
description: Anti-doom-scrolling philosophical quote feed
publish_to: 'none'
version: 1.1.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # UUID generation
  uuid: ^4.4.0

  # Navigation
  go_router: ^13.2.0

  # Gestures & animations
  flutter_card_swiper: ^7.0.1

  # Share
  share_plus: ^9.0.0

  # URL launcher
  url_launcher: ^6.3.0

  # Image (for export)
  screenshot: ^2.3.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Loading indicators
  shimmer: ^3.0.0

  # In-app purchases
  in_app_purchase: ^3.2.0

  # Ambient audio
  just_audio: ^0.9.39
  audio_session: ^0.1.21

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  fonts:
    - family: Playfair
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Italic.ttf
          style: italic
        - asset: assets/fonts/PlayfairDisplay-SemiBold.ttf
          weight: 600
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
  assets:
    - assets/fonts/
    - assets/images/
