<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MindScrolling · Test Pre-Release</title>
<style>
:root {
  --bg: #07070f;
  --card: #0e0e1c;
  --card2: #111120;
  --border: rgba(255,255,255,.07);
  --text: #e2e2f0;
  --muted: #52526a;
  --radius: 16px;
  --module-color: #8b5cf6;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 60% 40% at 50% -10%, rgba(139,92,246,.12), transparent);
  pointer-events: none;
  z-index: 0;
}
#app {
  width: 100%;
  max-width: 520px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 1;
}

/* ─── SCREENS ─────────────────────────────────────────────── */
.screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 28px 22px 48px;
  animation: fadeUp .35s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: none; }
}

/* ─── WELCOME ─────────────────────────────────────────────── */
.logo-area {
  text-align: center;
  padding: 36px 0 28px;
}
.logo-mark {
  font-size: 36px;
  display: block;
  margin-bottom: 12px;
  filter: drop-shadow(0 0 20px var(--module-color));
  transition: filter .4s;
}
.logo-title { font-size: 22px; font-weight: 800; letter-spacing: -.5px; color: #fff; }
.logo-sub { font-size: 12px; color: var(--muted); margin-top: 5px; letter-spacing: 1.2px; text-transform: uppercase; }

/* Instructions accordion */
.instr-toggle {
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  cursor: pointer;
  font-size: 13px;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  transition: background .15s;
  user-select: none;
}
.instr-toggle:hover { background: rgba(255,255,255,.05); }
.instr-toggle span { font-weight: 600; color: var(--text); }
.instr-arrow { transition: transform .25s; font-size: 12px; }
.instr-arrow.open { transform: rotate(180deg); }
.instr-body {
  background: rgba(255,255,255,.02);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 0 16px;
  overflow: hidden;
  max-height: 0;
  transition: max-height .35s ease, padding .2s;
  margin-bottom: 16px;
}
.instr-body.open { max-height: 600px; padding: 16px; }
.instr-step {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
}
.instr-step:last-child { margin-bottom: 0; }
.instr-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--module-color);
  color: #fff;
  font-size: 11px;
  font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.instr-text { font-size: 13px; color: var(--muted); line-height: 1.6; }
.instr-text strong { color: var(--text); font-weight: 600; }
.instr-text code {
  background: rgba(255,255,255,.07);
  border-radius: 5px;
  padding: 1px 6px;
  font-family: monospace;
  font-size: 12px;
  color: var(--module-color);
}
.instr-state-row {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}
.instr-state-chip {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 700;
}

.field-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-bottom: 8px;
  font-weight: 600;
}
.input-field {
  width: 100%;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 16px;
  padding: 14px 16px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  font-family: inherit;
}
.input-field:focus {
  border-color: var(--module-color);
  box-shadow: 0 0 0 3px rgba(139,92,246,.15);
}
.input-field::placeholder { color: var(--muted); }

/* Module grid */
.module-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 11px;
  margin: 24px 0 0;
}
.module-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 14px 16px;
  cursor: pointer;
  transition: border-color .2s, transform .15s, box-shadow .2s;
  position: relative;
  overflow: hidden;
  user-select: none;
}
.module-card::after {
  content: ''; position: absolute; inset: 0;
  background: var(--c, #8b5cf6); opacity: 0;
  transition: opacity .2s; border-radius: 14px;
}
.module-card.selected {
  border-color: var(--c, #8b5cf6);
  box-shadow: 0 0 0 1px var(--c, #8b5cf6), 0 8px 24px rgba(0,0,0,.4);
  transform: translateY(-1px);
}
.module-card.selected::after { opacity: .07; }
.module-card:active { transform: scale(.97); }
.module-num {
  position: absolute; top: 10px; right: 10px;
  font-size: 10px; font-weight: 800;
  color: var(--c, #8b5cf6);
  background: rgba(255,255,255,.05);
  padding: 2px 7px; border-radius: 20px;
}
.module-icon { font-size: 22px; margin-bottom: 9px; display: block; }
.module-name { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 3px; }
.module-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }
.module-testers { font-size: 10px; color: var(--c, #8b5cf6); margin-top: 8px; font-weight: 700; }

/* Testing state pills */
.state-pills {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin: 24px 0 0;
}
.state-pill {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 12px 8px;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  user-select: none;
}
.state-pill:active { transform: scale(.96); }
.state-pill.selected {
  border-color: var(--sp-color, #8b5cf6);
  background: rgba(139,92,246,.06);
}
.state-pill-icon { font-size: 18px; margin-bottom: 4px; display: block; }
.state-pill-name { font-size: 11px; font-weight: 700; color: var(--text); display: block; }
.state-pill-sub { font-size: 10px; color: var(--muted); display: block; margin-top: 1px; }

/* Progress badge for repeated tests */
.repeat-badge {
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  margin: 16px 0 0;
  line-height: 1.5;
}
.repeat-badge strong { color: var(--text); }

/* ─── BUTTONS ─────────────────────────────────────────────── */
.btn {
  display: block; width: 100%; padding: 16px;
  border: none; border-radius: 14px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  transition: all .15s; letter-spacing: -.2px; font-family: inherit;
}
.btn:active { transform: scale(.97); }
.btn:disabled { cursor: not-allowed; }
.btn-primary { background: var(--module-color); color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,.3); }
.btn-primary:hover:not(:disabled) { filter: brightness(1.1); }
.btn-ghost {
  background: rgba(255,255,255,.05); color: var(--text);
  border: 1.5px solid var(--border); margin-top: 10px;
}
.btn-ghost:hover { background: rgba(255,255,255,.08); }

/* ─── PROGRESS HEADER ─────────────────────────────────────── */
.q-header {
  display: flex; align-items: center;
  gap: 10px; margin-bottom: 14px;
}
.back-btn {
  background: rgba(255,255,255,.06); border: none;
  color: var(--text); cursor: pointer; font-size: 17px;
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .15s;
}
.back-btn:hover { background: rgba(255,255,255,.1); }
.module-badge {
  background: var(--module-color); color: #fff;
  font-size: 11px; font-weight: 700;
  padding: 5px 11px; border-radius: 20px;
  letter-spacing: .3px; white-space: nowrap;
}
.state-badge {
  font-size: 10px; font-weight: 700;
  padding: 4px 9px; border-radius: 20px;
  border: 1.5px solid; white-space: nowrap;
}
.q-counter { margin-left: auto; font-size: 13px; color: var(--muted); white-space: nowrap; font-weight: 600; }
.progress-wrap {
  height: 4px; background: rgba(255,255,255,.06);
  border-radius: 4px; margin-bottom: 28px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--module-color);
  border-radius: 4px; transition: width .5s cubic-bezier(.4,0,.2,1);
}

/* ─── QUESTION ────────────────────────────────────────────── */
.q-num { font-size: 11px; color: var(--module-color); text-transform: uppercase; letter-spacing: .8px; font-weight: 700; margin-bottom: 8px; }
.q-text { font-size: 20px; font-weight: 700; line-height: 1.4; color: #fff; margin-bottom: 26px; letter-spacing: -.3px; }

/* Stars */
.stars-wrap { display: flex; gap: 10px; justify-content: center; padding: 4px 0 28px; }
.star { font-size: 38px; cursor: pointer; transition: transform .15s, opacity .15s, filter .15s; opacity: .2; user-select: none; filter: grayscale(1); }
.star.active { opacity: 1; filter: none; color: var(--module-color); }
.star:hover { transform: scale(1.15); }
.star:active { transform: scale(1.25); }
.stars-label { text-align: center; font-size: 13px; color: var(--muted); margin-top: -16px; margin-bottom: 20px; min-height: 20px; }

/* Choice pills */
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice-btn {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 13px; color: var(--text); font-size: 15px;
  padding: 15px 16px; cursor: pointer; text-align: left;
  transition: all .15s; display: flex; align-items: center;
  gap: 12px; font-family: inherit; line-height: 1.4;
}
.choice-btn:active { transform: scale(.98); }
.choice-btn.selected { border-color: var(--module-color); background: rgba(139,92,246,.07); color: #fff; }
.choice-check {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 12px; font-weight: 700; transition: all .15s;
}
.choice-btn.selected .choice-check { background: var(--module-color); border-color: var(--module-color); color: #fff; }

/* Textarea */
.text-input {
  width: 100%; background: var(--card); border: 2px solid var(--border);
  border-radius: 13px; color: var(--text); font-size: 15px;
  padding: 14px 16px; outline: none; resize: none; min-height: 100px;
  font-family: inherit; line-height: 1.6; transition: border-color .2s, box-shadow .2s;
}
.text-input:focus { border-color: var(--module-color); box-shadow: 0 0 0 3px rgba(139,92,246,.12); }
.text-input::placeholder { color: var(--muted); }

/* ─── IMAGE UPLOAD ─────────────────────────────────────────── */
.img-area { margin-top: 14px; }
.img-upload-label {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.04); border: 1.5px dashed rgba(255,255,255,.15);
  border-radius: 11px; padding: 10px 16px; cursor: pointer;
  font-size: 13px; color: var(--muted); transition: all .15s;
  user-select: none;
}
.img-upload-label:hover { background: rgba(255,255,255,.07); border-color: rgba(255,255,255,.25); color: var(--text); }
.img-upload-input { display: none; }
.img-thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.img-thumb-wrap {
  position: relative;
  width: 70px; height: 70px;
}
.img-thumb {
  width: 70px; height: 70px;
  object-fit: cover; border-radius: 9px;
  border: 1.5px solid var(--border);
  display: block;
}
.img-thumb-del {
  position: absolute; top: -6px; right: -6px;
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(239,68,68,.9); color: #fff;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: none;
  box-shadow: 0 2px 6px rgba(0,0,0,.4);
}

.skip-link {
  text-align: center; color: var(--muted); font-size: 13px;
  cursor: pointer; margin-top: 14px;
  text-decoration: underline; text-underline-offset: 3px;
}
.skip-link:hover { color: var(--text); }

/* ─── DONE SCREEN ─────────────────────────────────────────── */
.done-hero { text-align: center; padding: 40px 0 24px; }
.done-icon { font-size: 52px; display: block; margin-bottom: 14px; animation: popIn .4s ease; }
@keyframes popIn {
  from { transform: scale(.5); opacity: 0; }
  60%  { transform: scale(1.2); }
  to   { transform: scale(1); opacity: 1; }
}
.done-title { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 8px; letter-spacing: -.5px; }
.done-sub { font-size: 14px; color: var(--muted); max-width: 300px; margin: 0 auto 28px; line-height: 1.6; }
.wa-status {
  background: rgba(37,211,102,.08); border: 1px solid rgba(37,211,102,.2);
  border-radius: 12px; padding: 14px 16px; font-size: 14px;
  color: #25d366; text-align: center; margin-bottom: 14px; font-weight: 600;
}
.report-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  font-size: 12px; color: var(--muted);
  white-space: pre-wrap; word-break: break-word;
  max-height: 180px; overflow-y: auto; text-align: left;
  margin-bottom: 16px; line-height: 1.7;
  font-family: 'Menlo', 'Monaco', monospace;
}

/* Screenshots gallery in done screen */
.screenshots-section { margin-bottom: 16px; }
.screenshots-title {
  font-size: 11px; color: var(--muted); text-transform: uppercase;
  letter-spacing: .8px; font-weight: 600; margin-bottom: 10px;
}
.screenshots-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.screenshots-grid img {
  width: 80px; height: 80px;
  object-fit: cover; border-radius: 10px;
  border: 1.5px solid var(--border); cursor: pointer;
  transition: transform .15s;
}
.screenshots-grid img:active { transform: scale(.95); }
.img-forward-note {
  background: rgba(245,158,11,.07);
  border: 1px solid rgba(245,158,11,.2);
  border-radius: 11px; padding: 12px 14px;
  font-size: 13px; color: rgba(245,158,11,.9);
  margin-bottom: 14px; line-height: 1.5;
}
.img-forward-note strong { font-weight: 700; }

.action-hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 6px; min-height: 18px; }

/* ─── UTILS ───────────────────────────────────────────────── */
.spacer { flex: 1; }
.mt8  { margin-top: 8px; }
.mt12 { margin-top: 12px; }
.mt16 { margin-top: 16px; }
.mt24 { margin-top: 24px; }
.divider { height: 1px; background: var(--border); margin: 18px 0; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }

/* Lightbox */
.lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,.92);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; animation: fadeIn .2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 12px; }
</style>
</head>

<div id="app"></div>

  moduleId: null,
  testingState: null,   // 'free' | 'trial' | 'premium'

let capturedImages = {};

const app = document.getElementById("app");

function setColor(color) {
  document.documentElement.style.setProperty("--module-color", color);
}
function render() {
  if (state.screen === "welcome")   renderWelcome();
  else if (state.screen === "questions") renderQuestion();
  else if (state.screen === "done") renderDone();
}

function canStart() {
  return !!(state.testerName && state.testerName.trim() && state.moduleId && state.testingState);
}

function updateStartBtn() {
  const btn = document.getElementById("start-btn");
  if (!btn) return;
  const ok = canStart();
  btn.disabled = !ok;
  btn.style.opacity = ok ? "1" : ".4";
}

// ─── QUESTION ────────────────────────────────────────────────────────────────
function renderQuestion() {
  const mod = MODULES[state.moduleId];
  const questions = mod.questions;
  const qi = state.currentQ;
  const q = questions[qi];
  const pct = Math.round((qi / questions.length) * 100);
  const ans = state.answers[q.id];
  const canNext = q.optional || (ans !== undefined && ans !== "" && ans !== null);
  const ts = TESTING_STATES[state.testingState];

  setColor(mod.color);

  app.innerHTML = `
    <div class="screen">
      <div class="q-header">
        <button class="back-btn" id="back-btn">←</button>
        <span class="module-badge">${mod.icon} ${mod.name}</span>
        <span class="state-badge" style="color:${ts.color};border-color:${ts.color}40;background:${ts.color}12">
          ${ts.icon} ${ts.label}
        </span>
        <span class="q-counter">${qi + 1}/${questions.length}</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>

      <div class="q-num">Pregunta ${qi + 1}</div>
      <div class="q-text">${esc(q.text)}</div>

      <div id="answer-area">${buildAnswerHTML(q, ans)}</div>

      <!-- Image attachment -->
      <div class="img-area">
        <label class="img-upload-label" for="img-input-${q.id}">
          📷 Adjuntar screenshot
          <input type="file" class="img-upload-input" id="img-input-${q.id}"
            accept="image/*" multiple>
        </label>
        <div class="img-thumbs" id="thumbs-${q.id}">
          ${renderThumbs(q.id)}
        </div>
      </div>

      <div class="spacer"></div>
      ${q.optional ? `<div class="skip-link" id="skip-btn">Saltar esta pregunta</div>` : ""}
      <button class="btn btn-primary mt16" id="next-btn"
        ${canNext ? "" : 'disabled style="opacity:.4"'}>
        ${qi === questions.length - 1 ? "Enviar respuestas ✓" : "Siguiente →"}
      </button>
    </div>`;

  wireAnswerEvents(q);
  wireImageInput(q.id);

  document.getElementById("back-btn").addEventListener("click", () => {
    if (state.currentQ === 0) { state.screen = "welcome"; render(); }
    else { state.currentQ--; render(); }
  });

  document.getElementById("next-btn").addEventListener("click", () => {
    if (document.getElementById("next-btn").disabled) return;
    const isLast = qi === questions.length - 1;
    if (isLast) sendToWhatsApp();
    advanceQuestion(questions);
  });

  const skipBtn = document.getElementById("skip-btn");
  if (skipBtn) {
    skipBtn.addEventListener("click", () => {
      state.answers[q.id] = "";
      advanceQuestion(questions);
    });
  }
}

function renderThumbs(qid) {
  const imgs = capturedImages[qid] || [];
  return imgs.map((img, i) => `
    <div class="img-thumb-wrap" data-qid="${qid}" data-idx="${i}">
      <img class="img-thumb" src="${img.url}" alt="${esc(img.name)}">
      <button class="img-thumb-del" data-qid="${qid}" data-idx="${i}">×</button>
    </div>
  `).join("");
}

function wireImageInput(qid) {
  const input = document.getElementById(`img-input-${qid}`);
  if (!input) return;

  input.addEventListener("change", () => {
    if (!capturedImages[qid]) capturedImages[qid] = [];
    Array.from(input.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        capturedImages[qid].push({ url: e.target.result, name: file.name });
        const thumbs = document.getElementById(`thumbs-${qid}`);
        if (thumbs) thumbs.innerHTML = renderThumbs(qid);
        wireThumDel(qid);
      };
      reader.readAsDataURL(file);
    });
    input.value = "";
  });

  wireThumDel(qid);
}

function wireThumDel(qid) {
  document.querySelectorAll(`.img-thumb-del[data-qid="${qid}"]`).forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx);
      capturedImages[qid].splice(idx, 1);
      const thumbs = document.getElementById(`thumbs-${qid}`);
      if (thumbs) thumbs.innerHTML = renderThumbs(qid);
      wireThumDel(qid);
    });
  });
  // Tap to enlarge
  document.querySelectorAll(`.img-thumb[data-qid="${qid}"], .img-thumb-wrap[data-qid="${qid}"] img`).forEach(img => {
    img.addEventListener("click", () => openLightbox(img.src));
  });
}

function openLightbox(src) {
  const lb = document.createElement("div");
  lb.className = "lightbox";
  lb.innerHTML = `<img src="${src}">`;
  lb.addEventListener("click", () => lb.remove());
  document.body.appendChild(lb);
}

function buildAnswerHTML(q, ans) {
  if (q.type === "stars") {
    const val = ans || 0;
    const label = val > 0 && q.labels ? q.labels[val - 1] : "";
    return `
      <div class="stars-wrap">
        ${[1,2,3,4,5].map(n =>
          `<span class="star ${n <= val ? 'active' : ''}" data-val="${n}">★</span>`
        ).join("")}
      </div>
      <div class="stars-label" id="stars-label">${esc(label)}</div>`;
  }
  if (q.type === "choice") {
    return `<div class="choices">
      ${q.options.map(opt => `
        <button class="choice-btn ${ans === opt ? 'selected' : ''}" data-val="${esc(opt)}">
          <span class="choice-check">${ans === opt ? '✓' : ''}</span>
          ${esc(opt)}
        </button>
      `).join("")}
    </div>`;
  }
  if (q.type === "text") {
    return `<textarea class="text-input" id="text-ans"
      placeholder="${esc(q.placeholder || '')}" rows="4">${esc(ans || "")}</textarea>`;
  }
  return "";
}

function wireAnswerEvents(q) {
  if (q.type === "stars") {
    document.querySelectorAll(".star").forEach(star => {
      star.addEventListener("click", () => {
        const val = parseInt(star.dataset.val);
        state.answers[q.id] = val;
        document.querySelectorAll(".star").forEach((s, i) => s.classList.toggle("active", i < val));
        const lbl = document.getElementById("stars-label");
        if (lbl && q.labels) lbl.textContent = q.labels[val - 1] || "";
        enableNext();
      });
    });
  }
  if (q.type === "choice") {
    document.querySelectorAll(".choice-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        state.answers[q.id] = btn.dataset.val;
        document.querySelectorAll(".choice-btn").forEach(b => {
          b.classList.toggle("selected", b === btn);
          b.querySelector(".choice-check").textContent = b === btn ? "✓" : "";
        });
        enableNext();
      });
    });
  }
  if (q.type === "text") {
    const ta = document.getElementById("text-ans");
    if (ta) {
      ta.addEventListener("input", () => {
        state.answers[q.id] = ta.value;
        if (!q.optional) enableNext();
      });
    }
  }
}

function enableNext() {
  const btn = document.getElementById("next-btn");
  if (btn) { btn.disabled = false; btn.style.opacity = "1"; }
}

function advanceQuestion(questions) {
  if (state.currentQ < questions.length - 1) {
    state.currentQ++;
    render();
  } else {
    // Mark this state as completed
    const testedKey = `ms_tested_${state.moduleId}`;
    const testedStates = JSON.parse(sessionStorage.getItem(testedKey) || "[]");
    if (!testedStates.includes(state.testingState)) {
      testedStates.push(state.testingState);
      sessionStorage.setItem(testedKey, JSON.stringify(testedStates));
    }
    state.screen = "done";
    render();
  }
}

// ─── BUILD REPORT ────────────────────────────────────────────────────────────
function buildReport() {
  const mod = MODULES[state.moduleId];
  const ts = TESTING_STATES[state.testingState];
  const date = new Date().toLocaleDateString("es", {
    day: "2-digit", month: "2-digit", year: "numeric"
  });
  const totalImages = collectAllImages().length;

  const lines = [
    `🧪 MindScrolling · Test Pre-Release`,
    `━━━━━━━━━━━━━━━━━━━━━━━━`,
    `Tester  : ${state.testerName}`,
    `Módulo  : M${state.moduleId} — ${mod.name}`,
    `Estado  : ${ts.icon} ${ts.label}`,
    `Fecha   : ${date}`,
    totalImages > 0 ? `Screenshots: ${totalImages} imagen${totalImages > 1 ? 'es' : ''} adjunta${totalImages > 1 ? 's' : ''}` : "",
    `━━━━━━━━━━━━━━━━━━━━━━━━`,
    ""
  ].filter(Boolean);

  mod.questions.forEach((q, i) => {
    const ans = state.answers[q.id];
    if (ans === undefined || ans === null || ans === "") return;
    const display = typeof ans === "number"
      ? "★".repeat(ans) + "☆".repeat(5 - ans) + ` (${ans}/5)`
      : ans;
    const imgs = capturedImages[q.id];
    const imgNote = imgs && imgs.length > 0 ? ` 📷×${imgs.length}` : "";
    lines.push(`${i + 1}. ${q.text}${imgNote}`);
    lines.push(`   → ${display}`);
    lines.push("");
  });

  return lines.join("\n");
}

function collectAllImages() {
  return Object.values(capturedImages).flat();
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function esc(str) {
  if (str === null || str === undefined) return "";
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function copyText(text) {
  if (navigator.clipboard) navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  else fallbackCopy(text);
}
function fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.cssText = "position:fixed;opacity:0;top:0;left:0";
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
}

render();
</script>
